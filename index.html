<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartPlaner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div>
        <h1 class="login-card__title">PartPlaner</h1>
        <p class="login-card__subtitle">Enter your name to continue</p>
      </div>

      <form id="login-form" class="flex flex-col gap-16">
        <div class="form-group">
          <label class="label" for="name-input">Your name</label>
          <input
            id="name-input"
            class="input"
            type="text"
            placeholder="e.g. Alice"
            autocomplete="off"
            autocapitalize="words"
            required
          />
        </div>

        <p id="error-msg" style="display:none; color:var(--danger); font-size:1.3rem;"></p>

        <button type="submit" class="btn btn-primary">Continue →</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { getActiveParty } from './js/firebase.js';

    const ADMIN_NAME = 'jarmonster';

    const form    = document.getElementById('login-form');
    const input   = document.getElementById('name-input');
    const errorEl = document.getElementById('error-msg');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = input.value.trim();
      if (!name) return;

      errorEl.style.display = 'none';

      sessionStorage.setItem('pp_name', name);

      if (name.toLowerCase() === ADMIN_NAME) {
        window.location.href = 'admin.html';
        return;
      }

      // Regular user: check if there is an active party
      try {
        const party = await getActiveParty();
        if (!party) {
          showError('No party is currently open. Check back later!');
          return;
        }
        sessionStorage.setItem('pp_party_id', party.id);
        window.location.href = 'shifts.html';
      } catch (err) {
        showError('Could not connect. Make sure Firebase is configured.');
        console.error(err);
      }
    });
  </script>

</body>
</html>
