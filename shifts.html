<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shift Sign-Up – PartPlaner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <span class="nav__logo">PartPlaner</span>
    <button id="logout-btn" class="btn btn-ghost btn-sm">← Change name</button>
  </nav>

  <div class="container">
    <!-- Party header -->
    <div class="page-header">
      <h1 class="page-header__title" id="party-title">Loading…</h1>
      <p class="page-header__sub" id="party-date"></p>
    </div>

    <!-- Status banner (shown when registration is closed) -->
    <div id="reg-closed-banner" style="display:none; margin-bottom:2.4rem;">
      <div class="card" style="background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2);">
        <p style="color:var(--danger); font-size:1.4rem;">
          Registration is currently closed. The admin will open it soon.
        </p>
      </div>
    </div>

    <!-- Shift grid -->
    <div id="shift-container" style="padding-bottom:4rem;"></div>
  </div>

  <script type="module" src="js/shifts.js"></script>

</body>
</html>
